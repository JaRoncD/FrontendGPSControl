<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio</title>
<style>

  /* ── RESET GLOBAL ─────────────────────────────
     Elimina márgenes, rellenos y normaliza
     el modelo de caja en todos los elementos.
  ─────────────────────────────────────────── */
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  /* ── PÁGINA BASE ──────────────────────────────
     Ocupa todo el viewport, fondo blanco,
     sin scroll (la animación es full-screen).
  ─────────────────────────────────────────── */
  html {
    width: 100%;
    height: 100%;
  }
  body {
    width: 100%;
    height: 100%;
    background: #ffffff;
  }

  /* ── CANVAS DE ANIMACIÓN (#bg) ────────────────
     Capa de fondo que ocupa toda la pantalla.
     El semicírculo animado se dibuja aquí.
     z-index: 0 → queda detrás de todo.
     pointer-events: none → no bloquea clicks.
  ─────────────────────────────────────────── */
  #bg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  /* ── ÍCONO DEL TELÉFONO (.phone-icon) ─────────
     Centrado en pantalla con position fixed.
     z-index: 2 → entre línea 1 (z:1) y línea 2 (z:3).
     Aparece con animación fadeUp después de 1s de delay.
       · 1.4s  = duración de la animación
       · 1s    = delay antes de iniciar
  ─────────────────────────────────────────── */
  .phone-icon {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
    pointer-events: none;
    opacity: 0;
    animation: fadeUpCenter 1.4s cubic-bezier(0.22,1,0.36,1) 1s forwards;
  }
  .phone-icon img {
    width: clamp(220px, 28vw, 420px); /* responsivo: mín 220px, ideal 28vw, máx 420px */
    height: auto;
    display: block;
    filter: drop-shadow(0 20px 60px rgba(0,0,0,0.12));
  }

  /* ── WRAPPER DE TEXTO (.text-wrap) ───────────
     Base compartida por ambas capas de texto.
     Centrado igual que el ícono para alineación.
  ─────────────────────────────────────────── */
  .text-wrap {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    white-space: nowrap;
    line-height: 1.15;
    pointer-events: none;
    opacity: 0;
    animation: fadeUpCenter 1.4s cubic-bezier(0.22,1,0.36,1) 0.3s forwards;
  }

  /* ── CAPA TRASERA (.hero-text-back) ──────────
     Contiene: línea 1 visible + línea 2 oculta.
     La línea 2 oculta (visibility:hidden) reserva
     el espacio para que ambas capas sean idénticas.
     z-index: 1 → detrás del ícono (z:2).
  ─────────────────────────────────────────── */
  .hero-text-back {
    z-index: 1;
  }

  /* ── CAPA DELANTERA (.hero-text-front) ───────
     Contiene: línea 1 oculta + línea 2 visible.
     z-index: 3 → delante del ícono (z:2).
  ─────────────────────────────────────────── */
  .hero-text-front {
    z-index: 3;
  }

  /* ── LÍNEA 1 — "BIENVENIDO A" ─────────────────
     Azul navy oscuro. Borde blanco de 3px para
     legibilidad sobre el ícono.
     paint-order: stroke fill → el borde queda
     debajo del relleno, sin tapar las letras.
  ─────────────────────────────────────────── */
  .line1 {
    display: block;
    font-family: 'Arial Black', 'Arial Bold', Arial, sans-serif;
    font-weight: 900;
    font-size: clamp(36px, 6.5vw, 96px);
    color: #1a1f8c;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    -webkit-text-stroke: 3px #ffffff;
    paint-order: stroke fill;
  }

  /* ── LÍNEA 2 — "MONITORING INNOVATION" ───────
     Azul eléctrico. Mismo borde blanco que línea 1.
  ─────────────────────────────────────────── */
  .line2 {
    display: block;
    font-family: 'Arial Black', 'Arial Bold', Arial, sans-serif;
    font-weight: 900;
    font-size: clamp(32px, 5.8vw, 86px);
    color: #1565e8;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    -webkit-text-stroke: 3px #ffffff;
    paint-order: stroke fill;
  }

  /* ── LOGO SUPERIOR IZQUIERDO (.top-logo) ──────
     Ícono SVG fijo en la esquina superior izquierda.
     z-index: 10 → siempre visible sobre todo.
     Aparece con fadeUpSimple al cargar la página.
  ─────────────────────────────────────────── */
  .top-logo {
    position: fixed;
    top: 28px;
    left: 32px;
    z-index: 10;
    opacity: 0;
    animation: fadeUpSimple 1.2s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
  }
  .top-logo img {
    width: clamp(30px, 4vw, 55px);
    height: auto;
    display: block;
  }
     /*4 enlaces en color cyan distribuidos
     horizontalmente en la parte inferior.
     z-index: 10 → siempre por encima de todo.
     Aparece con fadeUp simple (sin translate center).
  ─────────────────────────────────────────── */
  .bottom-nav {
    position: fixed;
    bottom: 60px;
    top: auto;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: clamp(24px, 6vw, 100px);
    z-index: 10;
    opacity: 0;
    animation: fadeUpSimple 1.2s cubic-bezier(0.22,1,0.36,1) 1.2s forwards;
  }
  .bottom-nav a {
    font-family: Arial, sans-serif;
    font-weight: 400;
    font-size: clamp(13px, 1.5vw, 18px);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #00bcd4;
    text-decoration: none;
    white-space: nowrap;
    transition: opacity 0.2s;
  }
  .bottom-nav a:hover {
    opacity: 0.65;
  }

  /* ── ANIMACIÓN: fadeUpCenter ──────────────────
     Para elementos centrados con translate(-50%,-50%).
     Sube 18px mientras aparece. Mantiene el centrado.
     Usada por: ícono y capas de texto.
  ─────────────────────────────────────────── */
  @keyframes fadeUpCenter {
    from {
      opacity: 0;
      transform: translate(-50%, calc(-50% + 18px));
    }
    to {
      opacity: 1;
      transform: translate(-50%, -50%);
    }
  }

  /* ── ANIMACIÓN: fadeUpSimple ──────────────────
     Para elementos sin transform de centrado.
     Sube 12px mientras aparece.
     Usada por: barra de navegación inferior.
  ─────────────────────────────────────────── */
  @keyframes fadeUpSimple {
    from {
      opacity: 0;
      transform: translateY(16px); /* empieza 16px más abajo */
    }
    to {
      opacity: 1;
      transform: translateY(0); /* llega a su posición natural (bottom: 60px) */
    }
  }

</style>
</head>
<body>

  <!-- ── CANVAS — Animación del semicírculo ─────
       El JS dibuja el arco que crece y se desplaza
       de derecha a izquierda. z-index: 0 (fondo).
  ─────────────────────────────────────────── -->
  <canvas id="bg"></canvas>

  <!-- ── LOGO SUPERIOR IZQUIERDO (z-index: 10) ──
       SVG ubicado en la raíz del proyecto.
       Fijo en la esquina superior izquierda.
  ─────────────────────────────────────────── -->
  <div class="top-logo">
    <img src="Assets/Imagologo_motion.svg" alt="Logo Monitoring Innovation">
  </div>

  <!-- ── CAPA DE TEXTO TRASERA (z-index: 1) ─────
       "Bienvenido a" es VISIBLE.
       "Monitoring Innovation" está OCULTO con
       visibility:hidden (ocupa espacio para alinear).
  ─────────────────────────────────────────── -->
  <div class="text-wrap hero-text-back">
    <span class="line1">Bienvenido a</span>
    <span class="line2" style="visibility:hidden;">Monitoring Innovation</span>
  </div>

  <!-- ── ÍCONO DEL TELÉFONO (z-index: 2) ────────
       Imagen en carpeta Assets/.
       Queda entre las dos capas de texto,
       creando el efecto de profundidad.
  ─────────────────────────────────────────── -->
  <div class="phone-icon">
    <img src="Assets/Telefono-01.png" alt="Ícono teléfono Monitoring Innovation">
  </div>

  <!-- ── CAPA DE TEXTO DELANTERA (z-index: 3) ───
       "Bienvenido a" está OCULTO (ocupa espacio).
       "Monitoring Innovation" es VISIBLE y queda
       por encima del ícono.
  ─────────────────────────────────────────── -->
  <div class="text-wrap hero-text-front">
    <span class="line1" style="visibility:hidden;">Bienvenido a</span>
    <span class="line2">Monitoring Innovation</span>
  </div>

  <!-- ── BARRA DE NAVEGACIÓN INFERIOR (z-index: 10)
       4 enlaces en cyan distribuidos en la base.
       Siempre visible por encima de todo el contenido.
  ─────────────────────────────────────────── -->
  <nav class="bottom-nav">
    <a href="#">MonitoringInnovation</a>
    <a href="#">GPS Control</a>
    <a href="#">Link repo front</a>
    <a href="#">Link repo back</a>
  </nav>

<script>
// ═══════════════════════════════════════════════
//  SETUP DEL CANVAS
// ═══════════════════════════════════════════════
const canvas = document.getElementById('bg');
const ctx    = canvas.getContext('2d');
let W, H, dpr;

// Ajusta el canvas al tamaño real de la ventana
function resize() {
  dpr = window.devicePixelRatio || 1;
  W   = window.innerWidth;
  H   = window.innerHeight;
  canvas.width        = W * dpr;
  canvas.height       = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ═══════════════════════════════════════════════
//  VARIABLES DE ANIMACIÓN
//  phase : progreso del ciclo (0 → 1, en loop)
//  SPEED : ciclos por segundo (más bajo = más lento)
// ═══════════════════════════════════════════════
let phase    = 0;
let lastTime = null;
const SPEED  = 0.12;

// ═══════════════════════════════════════════════
//  FUNCIÓN PRINCIPAL DE DIBUJO
//  Dibuja el semicírculo con sombra exterior
//  que crece y se desplaza de derecha a izquierda.
// ═══════════════════════════════════════════════
function draw(ts) {
  if (!lastTime) lastTime = ts;
  const dt = (ts - lastTime) / 1000; // delta time en segundos
  lastTime = ts;

  phase = (phase + dt * SPEED) % 1;

  // Limpia y pinta fondo blanco
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  // ── Geometría ──────────────────────────────
  const Rmax = H * 0.936;    // radio máximo = 93.6% del alto de pantalla
  const cy   = H / 2;        // centro vertical

  // Easing in-out cuadrático
  const t    = phase % 1;
  const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;

  // Radio crece del 50% al 100% de Rmax
  const R = Rmax * (0.5 + 0.5 * ease);

  // Centro X: entra por la derecha y se desplaza a la izquierda
  const Rmin    = Rmax * 0.5;
  const cxStart = W + Rmin * 0.7 + W * 0.10; // fuera de pantalla derecha
  const cxEnd   = Rmax;                        // borde izquierdo en x=0
  const cx      = cxStart + (cxEnd - cxStart) * ease;

  // Ancho de la sombra exterior
  const shadowW = R * 0.22;

  // ── Opacidad: fade in primeros 30%, fade out últimos 30% ──
  const fadeZone = 0.3;
  let opacity = 1;
  if (ease < fadeZone)          opacity = ease / fadeZone;
  else if (ease > 1 - fadeZone) opacity = 1 - (ease - (1 - fadeZone)) / fadeZone;

  ctx.save();
  ctx.globalAlpha = opacity;

  // Paso 1: Relleno blanco interior del círculo
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();

  // Paso 2: Sombra exterior — gradiente radial desde el borde hacia afuera
  const grad = ctx.createRadialGradient(cx, cy, R - 1, cx, cy, R + shadowW);
  grad.addColorStop(0,    'rgba(130, 128, 124, 0.92)'); // oscuro en el borde
  grad.addColorStop(0.2,  'rgba(165, 163, 159, 0.60)');
  grad.addColorStop(0.55, 'rgba(210, 208, 205, 0.28)');
  grad.addColorStop(1,    'rgba(255, 255, 255, 0)');    // transparente al exterior

  ctx.beginPath();
  ctx.arc(cx, cy, R + shadowW, 0, Math.PI * 2, false); // anillo exterior
  ctx.arc(cx, cy, R,           0, Math.PI * 2, true);  // agujero interior
  ctx.fillStyle = grad;
  ctx.fill('evenodd');

  // Paso 3: Limpia el interior (blanco puro, sin filtración de sombra)
  ctx.beginPath();
  ctx.arc(cx, cy, R - 1, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();

  ctx.globalAlpha = 1;

  // Paso 4: Máscara blanca — oculta el lado derecho del círculo
  // Deja visible únicamente el semicírculo izquierdo (convexo hacia la izquierda)
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(cx, 0, R + shadowW + 10, H);

  ctx.restore();

  requestAnimationFrame(draw);
}

// Inicia el loop
requestAnimationFrame(draw);
</script>
</body>
</html>
