<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tabla de Aspirantes</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── BODY ──────────────────────────────────────
       Layout de dos columnas iguales (1fr 1fr).
       La tarjeta ocupa la izquierda y la tabla
       la derecha. padding y gap dan el respiro visual.
    ─────────────────────────────────────────────── */
    body {
      font-family: 'Montserrat', sans-serif;
      min-height: 100vh;
      background: #fdf6fb;
      display: grid;
      grid-template-columns: 1fr 1fr;
      padding: 40px;
      gap: 24px;
    }

    /* ── CENTRADO DE TARJETA ────────────────────────
       Flexbox para centrar la card horizontalmente
       dentro de su columna del grid.
    ─────────────────────────────────────────────── */
    .card-wrapper {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    /* ── TARJETA (CARD) ─────────────────────────────
       Contenedor principal del formulario de edición.
       transform: scale(1.2) → ampliación visual del 20%.
       transform-origin: top center → crece hacia abajo.
       transition permite animar el hover suavemente.
    ─────────────────────────────────────────────── */
    .card {
      width: 100%;
      max-width: 380px;
      transform: scale(1.2);
      transform-origin: top center;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      padding: 28px 20px 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
      transition: transform 0.2s ease;
    }
    .card:hover { transform: scale(1.3); }

    /* ── ÍCONO AGREGAR (+) ──────────────────────────
       Posicionado en la esquina superior izquierda
       de la tarjeta. Activa el modo agregar al click.
    ─────────────────────────────────────────────── */
    .card-add {
      position: absolute;
      top: 14px; left: 14px;
      width: 20px; height: 20px;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .card-add:hover { transform: scale(1.2); }

    /* ── FILA DE INPUT ──────────────────────────────
       Cada fila contiene un ícono + un campo de texto.
       gap: 14px da separación entre ícono e input.
    ─────────────────────────────────────────────── */
    .card-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    /* ── ÍCONOS DE CAMPO ────────────────────────────
       opacity: 0.4 estado inactivo (gris).
       opacity: 1  estado activo (.activo).
       Transición suave al cambiar de estado.
    ─────────────────────────────────────────────── */
    .card-row img.row-icon {
      width: 28px; height: 28px;
      flex-shrink: 0;
      opacity: 0.4;
      transition: opacity 0.2s;
    }
    .card-row img.row-icon.activo { opacity: 1; }

    /* ── CAMPO DE TEXTO ─────────────────────────────
       readonly por defecto (JS lo controla).
       cursor: default cuando está bloqueado.
       Estilos de foco y llenado con clases dinámicas.
    ─────────────────────────────────────────────── */
    .card-input {
      flex: 1;
      border: 1.5px solid #e8e8e8;
      border-radius: 30px;
      padding: 10px 18px;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      color: #aaa;
      background: #f7f7f7;
      outline: none;
      transition: border 0.2s, background 0.2s;
      cursor: default;
    }
    /* Estilo cuando el campo está habilitado para escribir */
    .card-input.editable { cursor: text; }
    .card-input.editable:focus  { border-color: #20c4d6; color: #555; }
    .card-input.filled          { color: #555; background: #fff; border-color: #e0e0e0; }

    /* ── BOTONES MODO EDICIÓN ───────────────────────
       Ocultos por defecto (opacity: 0, height: 0).
       Se muestran al seleccionar una fila (.visible).
       Contiene los íconos de cancelar y confirmar.
    ─────────────────────────────────────────────── */
    .card-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      height: 0;
      overflow: hidden;
    }
    .card-actions.visible { opacity: 1; pointer-events: all; height: auto; overflow: visible; }
    .card-actions img {
      width: 32px; height: 32px;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .card-actions img:hover { transform: scale(1.15); }

    /* ── BOTONES MODO AGREGAR ───────────────────────
       Ocultos por defecto. Visibles al activar el
       modo agregar (icono + clicked). Centrados.
    ─────────────────────────────────────────────── */
    .card-actions-crear {
      display: flex;
      justify-content: center;
      gap: 10px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      height: 0;
      overflow: hidden;
    }
    .card-actions-crear.visible { opacity: 1; pointer-events: all; height: auto; overflow: visible; }

    /* ── BOTONES CANCELAR / CREAR ───────────────────
       Estilo de botón de texto con borde de color.
       Cancelar: borde rosa. Crear: borde cyan.
    ─────────────────────────────────────────────── */
    .btn-cancelar-crear, .btn-crear {
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      padding: 7px 22px;
      border-radius: 30px;
      cursor: pointer;
      background: #fff;
      transition: background 0.2s;
    }
    .btn-cancelar-crear { color: #e8589e; border: 1.5px solid #E280BE; }
    .btn-cancelar-crear:hover { background: #fdf0f8; }
    .btn-crear { color: #20c4d6; border: 1.5px solid #20c4d6; }
    .btn-crear:hover { background: #f0fbfc; }

    /* ── MODALES ────────────────────────────────────
       Overlay semitransparente con blur de fondo.
       display: none por defecto → flex al mostrar.
       z-index: 999 → siempre encima de todo.
    ─────────────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      z-index: 999;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(2px);
    }
    .modal-overlay.show { display: flex; }

    /* ── CAJA DEL MODAL ─────────────────────────────
       Tarjeta centrada con animación de entrada.
       max-width: 340px mantiene el modal compacto.
    ─────────────────────────────────────────────── */
    .modal-box {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 8px 40px rgba(220,80,150,0.18);
      padding: 36px 32px 28px;
      max-width: 340px;
      width: 90%;
      text-align: center;
      animation: modalIn 0.2s ease;
    }
    @keyframes modalIn {
      from { transform: scale(0.85); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    .modal-icon { font-size: 36px; margin-bottom: 12px; }
    .modal-title {
      font-family: 'Montserrat', sans-serif;
      font-weight: 600; font-size: 16px;
      color: #444; margin-bottom: 10px;
    }
    .modal-msg {
      font-family: 'Montserrat', sans-serif;
      font-size: 13px; color: #999;
      line-height: 1.6; margin-bottom: 24px;
    }
    .modal-btns { display: flex; justify-content: center; gap: 12px; }
    .modal-btn {
      font-family: 'Montserrat', sans-serif;
      font-size: 13px; padding: 8px 26px;
      border-radius: 30px; cursor: pointer;
      border: none; transition: background 0.2s;
    }
    .modal-btn-primary { background: #E280BE; color: #fff; }
    .modal-btn-primary:hover { background: #d06aaa; }
    .modal-btn-cancel  { background: #fff; color: #999; border: 1.5px solid #ddd; }
    .modal-btn-cancel:hover  { background: #f5f5f5; }
    .modal-btn-danger  { background: #E280BE; color: #fff; }
    .modal-btn-danger:hover  { background: #d06aaa; }

    /* ── CENTRADO DE TABLA ──────────────────────────
       Flexbox para centrar la tabla en su columna.
    ─────────────────────────────────────────────── */
    .table-outer {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    /* ── TABLA WRAPPER ──────────────────────────────
       Contenedor visual de la tabla.
       overflow: hidden → respeta el border-radius.
       transform: scale(1.2) → mismo escalado que card.
    ─────────────────────────────────────────────── */
    .table-wrapper {
      width: 100%;
      max-width: 600px;
      transform: scale(1.2);
      transform-origin: top center;
      background: #fff;
      border-radius: 0 0 16px 16px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(220,80,150,0.10);
    }

    /* ── SCROLL DE TABLA ────────────────────────────
       max-height limita la altura visible.
       overflow-y: auto activa el scroll vertical.
       Scrollbar personalizada en rosa.
    ─────────────────────────────────────────────── */
    .table-scroll { max-height: 450px; overflow-y: auto; }
    .table-scroll::-webkit-scrollbar { width: 5px; }
    .table-scroll::-webkit-scrollbar-track { background: #fdf6fb; }
    .table-scroll::-webkit-scrollbar-thumb { background: #e8b0d0; border-radius: 10px; }

    table { width: 100%; border-collapse: collapse; }

    /* ── ENCABEZADO DE TABLA ────────────────────────
       Fondo rosa (#E280BE), texto blanco, centrado.
       position: sticky + top: 0 → siempre visible
       al hacer scroll. z-index: 1 sobre las filas.
    ─────────────────────────────────────────────── */
    thead tr { background: #E280BE; }
    thead th {
      color: #fff;
      font-weight: 400;
      font-family: 'Montserrat', sans-serif;
      font-size: 22px;
      padding: 8px 20px;
      text-align: center;
      letter-spacing: 0.3px;
      border: 7px solid white;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    thead th:first-child { border-left: none; }
    thead th:last-child  { border-right: none; }
    thead tr             { border-top: none; }

    /* ── FILAS DE DATOS ─────────────────────────────
       Separador inferior entre filas.
       Hover y selección con fondos rosas distintos.
    ─────────────────────────────────────────────── */
    tbody tr {
      border-bottom: 2px solid #f5d0e8;
      transition: background 0.2s;
      cursor: pointer;
    }
    tbody tr:last-child   { border-bottom: none; }
    tbody tr:hover        { background: #fdf0f8; }
    tbody tr.selected-row { background: #fce8f3; }

    tbody td {
      padding: 6px 20px;
      font-size: 14px;
      color: #b0779a;
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
    }

    /* ── ÍCONOS DE ACCIÓN EN TABLA ──────────────────
       Contenedor flex para íconos editar/eliminar.
       Hover con escala para feedback visual.
    ─────────────────────────────────────────────── */
    .actions { display: flex; align-items: center; gap: 10px; }
    .actions img {
      width: 26px; height: 26px;
      cursor: pointer;
      transition: transform 0.15s;
    }
    .actions img:hover { transform: scale(1.15); }

    /* ── ANIMACIÓN ELIMINAR FILA ────────────────────
       La fila se encoge verticalmente (scaleY 1→0)
       mientras desaparece (opacity 1→0).
       pointer-events: none evita clicks durante la animación.
    ─────────────────────────────────────────────── */
    @keyframes fadeOutRow {
      0%   { opacity: 1; transform: scaleY(1); max-height: 100px; }
      100% { opacity: 0; transform: scaleY(0); max-height: 0; padding: 0; }
    }
    .row-removing {
      animation: fadeOutRow 0.35s ease forwards;
      transform-origin: top;
      overflow: hidden;
      pointer-events: none;
    }

    /* ── FOOTER ─────────────────────────────────────
       Fijo en la parte inferior centrado.
       Siempre visible por encima del contenido.
    ─────────────────────────────────────────────── */
    .footer {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px 0;
    }
    .footer-icon { transition: opacity 0.2s, transform 0.2s; }
    .footer-icon:hover { opacity: 1; transform: scale(1.05); }
  </style>
</head>
<body>

  <!-- ── TARJETA IZQUIERDA ──────────────────────────
       Formulario de edición/creación de registros.
       Contiene tres campos: Marca, Sucursal, Aspirante.
       Los campos están bloqueados (readonly) por defecto
       y se habilitan al activar modo editar o agregar.
  ─────────────────────────────────────────────── -->
  <div class="card-wrapper">
  <div class="card" id="card">

    <!-- Ícono + para activar modo agregar -->
    <img src="Assets/Icon_crear.svg" alt="Agregar" class="card-add" id="cardAdd" />

    <div class="card-row" style="margin-top:14px;">
      <img id="iconMarca" src="Assets/Icon_vehiculo.svg" alt="Marca" class="row-icon" />
      <input class="card-input" id="inputMarca" type="text" placeholder="Marca" readonly />
    </div>
    <div class="card-row">
      <img id="iconSucursal" src="Assets/Icon_puntoubicacion.svg" alt="Sucursal" class="row-icon" />
      <input class="card-input" id="inputSucursal" type="text" placeholder="Sucursal" readonly />
    </div>
    <div class="card-row">
      <img id="iconAspirante" src="Assets/Icon_persona.svg" alt="Aspirante" class="row-icon" />
      <input class="card-input" id="inputAspirante" type="text" placeholder="Aspirante" readonly />
    </div>

    <!-- Botones modo edición: cancelar (X) y confirmar (✓) -->
    <div class="card-actions" id="cardActions">
      <img src="Assets/Icon_cancelar.svg"  alt="Cancelar"  id="btnCancelar" />
      <img src="Assets/Icon_confirmar.svg" alt="Confirmar" id="btnConfirmar" />
    </div>

    <!-- Botones modo agregar: Cancelar y Crear -->
    <div class="card-actions-crear" id="cardActionsCrear">
      <button class="btn-cancelar-crear" id="btnCancelarCrear">Cancelar</button>
      <button class="btn-crear"          id="btnCrear">Crear</button>
    </div>
  </div>
  </div>

  <!-- ── TABLA DERECHA ──────────────────────────────
       Encabezado fijo (fuera del scroll) + cuerpo
       con scroll independiente. Dos tablas separadas
       con colgroup para alinear columnas.
  ─────────────────────────────────────────────── -->
  <div class="table-outer">
    <div class="table-wrapper">
      <!-- Encabezado fijo — siempre visible -->
      <table style="width:100%; border-collapse:collapse; table-layout:fixed;">
        <colgroup>
          <col style="width:28%"/>
          <col style="width:28%"/>
          <col style="width:44%"/>
        </colgroup>
        <thead>
          <tr>
            <th>Marca</th>
            <th>Sucursal</th>
            <th>Aspirante</th>
          </tr>
        </thead>
      </table>
      <!-- Cuerpo con scroll -->
      <div class="table-scroll">
        <table style="width:100%; border-collapse:collapse; table-layout:fixed;">
          <colgroup>
            <col style="width:28%"/>
            <col style="width:28%"/>
            <col style="width:44%"/>
          </colgroup>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ── MODAL: CAMPOS INCOMPLETOS ─────────────────
       Se muestra al intentar crear o confirmar
       con algún campo vacío.
  ─────────────────────────────────────────────── -->
  <div class="modal-overlay" id="modalVacio">
    <div class="modal-box">
      <div class="modal-icon">⚠️</div>
      <p class="modal-title">Campos incompletos</p>
      <p class="modal-msg">Por favor completa todos los campos antes de continuar.</p>
      <div class="modal-btns">
        <button class="modal-btn modal-btn-primary" id="modalVacioOk">Entendido</button>
      </div>
    </div>
  </div>

  <!-- ── MODAL: CONFIRMAR ELIMINAR ─────────────────
       Se muestra al hacer click en el ícono eliminar
       de cualquier fila. Requiere confirmación
       antes de ejecutar el DELETE en la API.
  ─────────────────────────────────────────────── -->
  <div class="modal-overlay" id="modalEliminar">
    <div class="modal-box">
      <div class="modal-icon">🗑️</div>
      <p class="modal-title">¿Eliminar registro?</p>
      <p class="modal-msg">Esta acción no se puede deshacer. ¿Estás seguro de que deseas eliminar esta fila?</p>
      <div class="modal-btns">
        <button class="modal-btn modal-btn-cancel" id="modalEliminarNo">Cancelar</button>
        <button class="modal-btn modal-btn-danger" id="modalEliminarSi">Eliminar</button>
      </div>
    </div>
  </div>

  <!-- ── PIE DE PÁGINA ─────────────────────────────
       Logo fijo en la parte inferior centrado.
  ─────────────────────────────────────────────── -->
  <footer class="footer">
    <img src="Assets/Imagologotipo_motion.svg" alt="Footer" class="footer-icon" />
  </footer>

  <script>

    // ════════════════════════════════════════════════════
    // JWT — PROTECCIÓN DE PÁGINA
    // Si no hay token en localStorage, redirige al login.
    // Esto evita acceso directo a la tabla sin autenticación.
    // ════════════════════════════════════════════════════
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'login.html';

    // ════════════════════════════════════════════════════
    // CONFIGURACIÓN API
    // URL base del backend Django en Render.
    // ════════════════════════════════════════════════════
    const API_BASE_URL = 'https://backendgpscontrol.onrender.com';

    // ── Helper: headers con JWT ──────────────────────
    // Incluye el token Bearer en cada petición autenticada.
    function authHeaders() {
      return {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${localStorage.getItem('token')}`
      };
    }

    // ── Helper: manejar respuesta 401 ───────────────
    // Si el token expiró o es inválido, limpia localStorage
    // y redirige al login automáticamente.
    function handleUnauthorized(response) {
      if (response.status === 401) {
        localStorage.removeItem('token');
        localStorage.removeItem('refresh');
        window.location.href = 'login.html';
        return true;
      }
      return false;
    }

    // ════════════════════════════════════════════════════
    // FUNCIONES API (CRUD) — CON JWT
    // Cada función envía el token en el header Authorization.
    // handleUnauthorized redirige al login si el token expira.
    // ════════════════════════════════════════════════════

    // READ → GET /api/registros/
    async function apiObtenerTodos() {
      const response = await fetch(`${API_BASE_URL}/api/registros/`, {
        headers: authHeaders()
      });
      if (handleUnauthorized(response)) return;
      if (!response.ok) throw new Error('Error al obtener registros');
      return await response.json();
    }

    // CREATE → POST /api/registros/
    // payload = { marca, sucursal, aspirante }
    // Retorna: { message, data: { id, marca, sucursal, aspirante } }
    async function apiCrear(payload) {
      const response = await fetch(`${API_BASE_URL}/api/registros/`, {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify(payload)
      });
      if (handleUnauthorized(response)) return;
      if (!response.ok) throw new Error('Error al crear');
      return await response.json();
    }

    // UPDATE → PUT /api/registros/:id/
    // payload = { marca, sucursal, aspirante }
    async function apiActualizar(id, payload) {
      const response = await fetch(`${API_BASE_URL}/api/registros/${id}/`, {
        method: 'PUT',
        headers: authHeaders(),
        body: JSON.stringify(payload)
      });
      if (handleUnauthorized(response)) return;
      if (!response.ok) throw new Error('Error al actualizar');
      return await response.json();
    }

    // DELETE → DELETE /api/registros/:id/
    async function apiEliminar(id) {
      const response = await fetch(`${API_BASE_URL}/api/registros/${id}/`, {
        method: 'DELETE',
        headers: authHeaders()
      });
      if (handleUnauthorized(response)) return;
      if (!response.ok) throw new Error('Error al eliminar');
      return true;
    }

    // ── Cerrar sesión ────────────────────────────────
    // Limpia los tokens del localStorage y redirige al login.
    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('refresh');
      window.location.href = 'login.html';
    }

    // ════════════════════════════════════════════════════
    // REFERENCIAS DOM
    // ════════════════════════════════════════════════════
    const tbody            = document.getElementById('tableBody');
    const cardActions      = document.getElementById('cardActions');
    const cardActionsCrear = document.getElementById('cardActionsCrear');
    const inputMarca       = document.getElementById('inputMarca');
    const inputSucursal    = document.getElementById('inputSucursal');
    const inputAspirante   = document.getElementById('inputAspirante');
    const iconMarca        = document.getElementById('iconMarca');
    const iconSucursal     = document.getElementById('iconSucursal');
    const iconAspirante    = document.getElementById('iconAspirante');
    const btnCancelar      = document.getElementById('btnCancelar');
    const btnConfirmar     = document.getElementById('btnConfirmar');
    const btnCancelarCrear = document.getElementById('btnCancelarCrear');
    const btnCrear         = document.getElementById('btnCrear');
    const cardAdd          = document.getElementById('cardAdd');
    const modalVacio       = document.getElementById('modalVacio');
    const modalEliminar    = document.getElementById('modalEliminar');
    const modalVacioOk     = document.getElementById('modalVacioOk');
    const modalEliminarNo  = document.getElementById('modalEliminarNo');
    const modalEliminarSi  = document.getElementById('modalEliminarSi');

    const allInputs = [inputMarca, inputSucursal, inputAspirante];
    const allIcons  = [
      { el: iconMarca,     def: 'Assets/Icon_vehiculo.svg',       act: 'Assets/Icon_vehiculo1.svg'       },
      { el: iconSucursal,  def: 'Assets/Icon_puntoubicacion.svg', act: 'Assets/Icon_puntoubicacion1.svg' },
      { el: iconAspirante, def: 'Assets/Icon_persona.svg',        act: 'Assets/Icon_persona1.svg'        },
    ];

    // ── Variables de estado ──────────────────────────
    let selectedRow     = null;  // TR actualmente seleccionado
    let selectedRowId   = null;  // ID del registro seleccionado (para PUT/DELETE)
    let modoAgregar     = false; // true cuando el usuario está creando un nuevo registro
    let pendingDeleteTr = null;  // TR pendiente de eliminar (esperando confirmación modal)
    let pendingDeleteId = null;  // ID del registro pendiente de eliminar

    // ════════════════════════════════════════════════════
    // HELPERS UI
    // ════════════════════════════════════════════════════

    // Activa los íconos de la tarjeta (estado lleno/coloreado)
    function activarIconos() {
      allIcons.forEach(({ el, act }) => { el.src = act; el.classList.add('activo'); });
    }

    // Restaura los íconos al estado inactivo (opacidad reducida)
    function desactivarIconos() {
      allIcons.forEach(({ el, def }) => { el.src = def; el.classList.remove('activo'); });
    }

    // Limpia todos los campos y quita la clase filled
    function limpiarCampos() {
      allInputs.forEach(inp => { inp.value = ''; inp.classList.remove('filled'); });
    }

    // Habilita escritura en los campos (modo editar o agregar)
    function habilitarCampos() {
      allInputs.forEach(inp => {
        inp.removeAttribute('readonly');
        inp.classList.add('editable');
      });
    }

    // Bloquea escritura en los campos (estado por defecto)
    function bloquearCampos() {
      allInputs.forEach(inp => {
        inp.setAttribute('readonly', true);
        inp.classList.remove('editable');
      });
    }

    // Valida que todos los campos tengan contenido
    function camposValidos() {
      return allInputs.every(inp => inp.value.trim() !== '');
    }

    // Muestra un modal agregando la clase .show
    function showModal(el) { el.classList.add('show'); }

    // Oculta un modal quitando la clase .show
    function hideModal(el) { el.classList.remove('show'); }

    // Rellena los campos de la tarjeta con los datos de una fila
    function llenarCampos(row) {
      inputMarca.value     = row.marca;
      inputSucursal.value  = row.sucursal;
      inputAspirante.value = row.aspirante;
      allInputs.forEach(inp => inp.classList.add('filled'));
    }

    // Obtiene los valores actuales del formulario como objeto
    function getFormValues() {
      return {
        marca:     inputMarca.value.trim(),
        sucursal:  inputSucursal.value.trim(),
        aspirante: inputAspirante.value.trim()
      };
    }

    // ── Bind botón eliminar de una fila ─────────────
    // Se llama al crear o regenerar íconos de una fila.
    function bindDeleteBtn(tr) {
      tr.querySelector('.btn-eliminar').addEventListener('click', (e) => {
        e.stopPropagation();
        pendingDeleteTr = tr;
        pendingDeleteId = tr.dataset.id;
        showModal(modalEliminar);
      });
    }

    // ── Actualizar íconos de tabla al seleccionar fila ──
    // La fila activa muestra íconos activos (coloreados).
    // El resto muestra íconos inactivos (apagados).
    function setTableIcons(activeTr) {
      document.querySelectorAll('#tableBody tr').forEach(tr => {
        const imgs = tr === activeTr
          ? ['Assets/icon_editar1.svg',  'Assets/Icon_eliminar1.svg']
          : ['Assets/icon_editar.svg',   'Assets/Icon_eliminar.svg'];
        tr.querySelector('.actions').innerHTML =
          `<img src="${imgs[0]}" alt="Editar"   class="btn-editar"/>
           <img src="${imgs[1]}" alt="Eliminar" class="btn-eliminar"/>`;
        bindDeleteBtn(tr);
      });
    }

    // ── Restaurar todos los íconos de tabla al estado activo ──
    // Se llama al deseleccionar una fila (clearSelection).
    function restoreTableIcons() {
      document.querySelectorAll('#tableBody tr').forEach(tr => {
        tr.querySelector('.actions').innerHTML =
          `<img src="Assets/icon_editar1.svg"   alt="Editar"   class="btn-editar"/>
           <img src="Assets/icon_eliminar1.svg" alt="Eliminar" class="btn-eliminar"/>`;
        bindDeleteBtn(tr);
      });
    }

    // ── Deseleccionar fila y resetear estado de la tarjeta ──
    // Quita la selección visual, limpia campos, bloquea inputs.
    function clearSelection() {
      if (selectedRow) { selectedRow.classList.remove('selected-row'); selectedRow = null; }
      selectedRowId = null;
      restoreTableIcons();
      limpiarCampos();
      bloquearCampos();
      desactivarIconos();
      cardActions.classList.remove('visible');
    }

    // ── Salir del modo agregar ───────────────────────
    // Resetea el estado del formulario y bloquea los inputs.
    function salirModoAgregar() {
      modoAgregar = false;
      limpiarCampos();
      bloquearCampos();
      desactivarIconos();
      cardActionsCrear.classList.remove('visible');
    }

    // ════════════════════════════════════════════════════
    // ACCIONES CRUD
    // ════════════════════════════════════════════════════

    // ── AGREGAR — click en ícono + ───────────────────
    // Activa el modo agregar: habilita campos y muestra
    // los botones Cancelar/Crear. Si ya estaba activo, cancela.
    cardAdd.addEventListener('click', () => {
      if (modoAgregar) { salirModoAgregar(); return; }
      clearSelection();
      modoAgregar = true;
      habilitarCampos();
      activarIconos();
      cardActionsCrear.classList.add('visible');
    });

    btnCancelarCrear.addEventListener('click', salirModoAgregar);

    // ── CREAR — POST /api/registros/ ─────────────────
    // Valida campos, envía el payload a la API y agrega
    // la nueva fila usando los datos retornados en nuevo.data.
    btnCrear.addEventListener('click', async () => {
      if (!camposValidos()) { showModal(modalVacio); return; }
      const payload = getFormValues();
      try {
        const nuevo = await apiCrear(payload);
        // La API retorna { message, data: { id, marca, sucursal, aspirante } }
        if (nuevo && nuevo.data) agregarFilaTabla(nuevo.data);
        salirModoAgregar();
      } catch (err) {
        console.error('Error al crear:', err);
      }
    });

    // ── CANCELAR EDICIÓN ─────────────────────────────
    btnCancelar.addEventListener('click', clearSelection);

    // ── MODIFICAR — PUT /api/registros/:id/ ──────────
    // Valida campos, envía el payload y actualiza el DOM
    // directamente para evitar un GET adicional.
    btnConfirmar.addEventListener('click', async () => {
      if (!camposValidos()) { showModal(modalVacio); return; }
      const payload = getFormValues();
      try {
        await apiActualizar(selectedRowId, payload);
        // Actualizar DOM directamente sin recargar
        if (selectedRow) {
          const celdas = selectedRow.querySelectorAll('td');
          celdas[0].textContent = payload.marca;
          celdas[1].textContent = payload.sucursal;
          celdas[2].querySelector('span').textContent = payload.aspirante;
        }
        clearSelection();
      } catch (err) {
        console.error('Error al actualizar:', err);
      }
    });

    // ── ELIMINAR — DELETE /api/registros/:id/ ────────
    modalVacioOk.addEventListener('click',    () => hideModal(modalVacio));
    modalEliminarNo.addEventListener('click', () => hideModal(modalEliminar));

    // Al confirmar eliminar: llama a la API y anima la fila
    // antes de removerla del DOM.
    modalEliminarSi.addEventListener('click', async () => {
      hideModal(modalEliminar);
      try {
        await apiEliminar(pendingDeleteId);
        if (pendingDeleteTr) {
          // Animación de salida antes de eliminar del DOM
          pendingDeleteTr.classList.add('row-removing');
          pendingDeleteTr.addEventListener('animationend', () => {
            pendingDeleteTr.remove();
            pendingDeleteTr = null;
            clearSelection();
          }, { once: true });
        }
        pendingDeleteId = null;
      } catch (err) {
        console.error('Error al eliminar:', err);
      }
    });

    // ════════════════════════════════════════════════════
    // RENDER DE FILAS
    // Crea un TR con los datos del registro y le asigna
    // los eventos de click y eliminar.
    // tr.dataset.id guarda el ID para operaciones API.
    // Los campos se leen del DOM al hacer click para
    // reflejar siempre los valores más recientes.
    // ════════════════════════════════════════════════════
    function agregarFilaTabla(row) {
      const tr = document.createElement('tr');
      tr.dataset.id = row.id; // ID usado en PUT y DELETE
      tr.innerHTML = `
        <td>${row.marca}</td>
        <td>${row.sucursal}</td>
        <td>
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <span>${row.aspirante}</span>
            <div class="actions">
              <img src="Assets/icon_editar1.svg"   alt="Editar"   class="btn-editar"/>
              <img src="Assets/icon_eliminar1.svg" alt="Eliminar" class="btn-eliminar"/>
            </div>
          </div>
        </td>`;

      bindDeleteBtn(tr);

      // Click en fila → activa modo edición
      tr.addEventListener('click', () => {
        if (modoAgregar) salirModoAgregar();
        if (selectedRow === tr) { clearSelection(); return; }
        if (selectedRow) selectedRow.classList.remove('selected-row');
        selectedRow   = tr;
        selectedRowId = tr.dataset.id;
        tr.classList.add('selected-row');
        setTableIcons(tr);
        // Leer del DOM para reflejar ediciones previas sin recargar
        const celdas = tr.querySelectorAll('td');
        llenarCampos({
          marca:     celdas[0].textContent.trim(),
          sucursal:  celdas[1].textContent.trim(),
          aspirante: celdas[2].querySelector('span').textContent.trim()
        });
        habilitarCampos(); // habilitar escritura al seleccionar fila
        activarIconos();
        cardActions.classList.add('visible');
      });

      tbody.appendChild(tr);
    }

    // ── Carga inicial desde API ──────────────────────
    // Al cargar la página obtiene todos los registros
    // y los renderiza en la tabla.
    // Para conectar: ya está activo, solo ajusta la URL.
    apiObtenerTodos().then(registros => {
      if (registros) registros.forEach(agregarFilaTabla);
    }).catch(err => console.error('Error al cargar registros:', err));

  </script>

</body>
